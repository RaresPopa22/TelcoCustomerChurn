model_name: 'xgboost'

model_output_paths:
  dir: 'models'
  model: 'models/xgboost_pipeline.joblib'
  threshold: 'models/xgboost_pipeline_threshold.json'

hyperparams:
  n_estimators: 500
  n_estimators_final: 5000
  learning_rate: 0.05
  max_depth: 5
  subsample: 0.8
  colsample_bytree: 0.8
  scale_pos_weight: 3
  scoring: 'average_precision'
  objective: 'binary:logistic'
  early_stopping_rounds: 50
  eval_metric: 'aucpr'
  cv: 5
  n_jobs: -1


param_grid:
  max_depth: [3, 5, 7]
  learning_rate: [0.01, 0.05, 0.1]
  subsample: [0.7, 0.8, 1.0]
  colsample_bytree: [0.7, 0.8, 1.0]
  scale_pos_weight: [1, 3, 5]
